services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build:
      context: .
      dockerfile: foundation/wp/docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${DB_PREFIX}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_DEBUG_LOG: "1"
      WORDPRESS_DEBUG_DISPLAY: "0"
    volumes:
      - wp_core:/var/www/html
      - ./${APP_PLUGIN_PATH}:/var/www/html/wp-content/plugins/${APP_PLUGIN_SLUG}:cached
      - foundation/wp/docker/php-sharedhost.ini:/usr/local/etc/php/conf.d/zz-sharedhost.ini:ro
      - wp_uploads:/var/www/html/wp-content/uploads

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}

volumes:
  db_data:
  wp_core:
  wp_uploads: