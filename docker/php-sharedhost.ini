; ──────────────────────────────────────────────────────────────────────────────
; WebmasterOS — Simulated Shared / Mutualized Hosting php.ini
;
; Applied ONLY in the local Docker dev container.
; Mirrors the restrictions of cPanel/SiteGround/OVH mutualized WordPress hosting.
; Any feature of our plugin that works here will work on real shared hosting.
; ──────────────────────────────────────────────────────────────────────────────


; ── SHELL / PROCESS EXECUTION — blocked on all mutualized hosts ───────────────
; If your plugin accidentally tries to use any of these, you'll get a clear
; "function disabled" error in the debug log rather than a silent failure.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,pcntl_exec,\
                    symlink,link,syslog,openlog,dl,phar_mimetypes,\
                    show_source,highlight_file,phpinfo

; ── MEMORY — conservative shared hosting defaults ─────────────────────────────
memory_limit          = 256M
max_execution_time    = 60
max_input_time        = 60
max_input_vars        = 3000

; ── UPLOADS ──────────────────────────────────────────────────────────────────
upload_max_filesize   = 64M
post_max_size         = 64M

; ── ERROR HANDLING — log to file, never display (same as production hosts) ───
display_errors        = Off
display_startup_errors = Off
log_errors            = On
; WordPress maps WP_DEBUG_LOG to wp-content/debug.log by default.
; We redirect PHP errors there too so everything is in one place.
error_log             = /var/www/html/wp-content/logs/php-error.log
error_reporting       = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── TMP / SESSION — same path restrictions as shared hosts ────────────────────
sys_temp_dir          = /tmp
session.save_path     = /tmp

; ── DATE ──────────────────────────────────────────────────────────────────────
date.timezone         = UTC

; ── OPCACHE — enabled as on most modern shared hosts ─────────────────────────
opcache.enable        = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
